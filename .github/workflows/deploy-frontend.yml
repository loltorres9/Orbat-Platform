name: Deploy Frontend to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/general-session-Lb8Lr
    paths: ['frontend/**']
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve deploy target
        run: |
          BRANCH_NAME="${GITHUB_REF#refs/heads/}"
          if [[ "${BRANCH_NAME}" == "main" ]]; then
            echo "DEPLOY_SUBDIR=." >> "$GITHUB_ENV"
            echo "PUBLIC_BASE_PATH=/Orbat-Platform/" >> "$GITHUB_ENV"
            echo "VITE_API_URL=${{ vars.VITE_API_URL }}" >> "$GITHUB_ENV"
          elif [[ "${BRANCH_NAME}" == "claude/general-session-Lb8Lr" ]]; then
            echo "DEPLOY_SUBDIR=claude-general-session" >> "$GITHUB_ENV"
            echo "PUBLIC_BASE_PATH=/Orbat-Platform/claude-general-session/" >> "$GITHUB_ENV"
            echo "VITE_API_URL=${{ secrets.VITE_API_URL_DEV }}" >> "$GITHUB_ENV"
          else
            echo "Unknown branch ${BRANCH_NAME}, skipping deploy"
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          VITE_API_URL: ${{ env.VITE_API_URL }}
          VITE_BASE_PATH: ${{ env.PUBLIC_BASE_PATH }}
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: frontend/dist
          destination_dir: ${{ env.DEPLOY_SUBDIR }}
          keep_files: true
