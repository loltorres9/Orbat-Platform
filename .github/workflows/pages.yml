name: Deploy Web to GitHub Pages

on:
  push:
    branches: ["main", "codex/working-2026-04-16"]
    paths:
      - "web/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "pages-${{ github.ref_name }}"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    env:
      BRANCH_NAME: ${{ github.ref_name }}
      API_MAIN: ${{ secrets.VITE_API_BASE_URL || vars.VITE_API_BASE_URL }}
      API_CODEX: ${{ secrets.VITE_API_BASE_URL_CODEX || vars.VITE_API_BASE_URL_CODEX }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Resolve deploy target
        shell: bash
        run: |
          if [[ "${BRANCH_NAME}" == "main" ]]; then
            echo "DEPLOY_SUBDIR=." >> "$GITHUB_ENV"
            echo "PUBLIC_BASE_PATH=/Orbat-Platform/" >> "$GITHUB_ENV"
            echo "VITE_API_BASE_URL=${API_MAIN}" >> "$GITHUB_ENV"
            echo "SITE_URL=https://loltorres9.github.io/Orbat-Platform/" >> "$GITHUB_ENV"
          elif [[ "${BRANCH_NAME}" == "codex/working-2026-04-16" ]]; then
            echo "DEPLOY_SUBDIR=codex-working-2026-04-16" >> "$GITHUB_ENV"
            echo "PUBLIC_BASE_PATH=/Orbat-Platform/codex-working-2026-04-16/" >> "$GITHUB_ENV"
            if [[ -n "${API_CODEX}" ]]; then
              echo "VITE_API_BASE_URL=${API_CODEX}" >> "$GITHUB_ENV"
            else
              echo "VITE_API_BASE_URL=${API_MAIN}" >> "$GITHUB_ENV"
            fi
            echo "SITE_URL=https://loltorres9.github.io/Orbat-Platform/codex-working-2026-04-16/" >> "$GITHUB_ENV"
          else
            echo "Unsupported branch ${BRANCH_NAME}" >&2
            exit 1
          fi

      - name: Validate branch API URL
        shell: bash
        run: |
          if [[ -n "${API_MAIN}" ]]; then
            echo "API_MAIN_SET=true"
          else
            echo "API_MAIN_SET=false"
          fi
          if [[ -n "${API_CODEX}" ]]; then
            echo "API_CODEX_SET=true"
          else
            echo "API_CODEX_SET=false"
          fi
          if [[ -z "${VITE_API_BASE_URL}" ]]; then
            echo "Missing VITE_API_BASE_URL for branch ${BRANCH_NAME}." >&2
            exit 1
          fi

      - name: Install dependencies
        shell: bash
        run: |
          if [[ -f package-lock.json ]]; then
            npm ci
          else
            npm install
          fi

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ env.VITE_API_BASE_URL }}
          VITE_PUBLIC_BASE_PATH: ${{ env.PUBLIC_BASE_PATH }}

      - name: Add nojekyll marker
        shell: bash
        run: touch dist/.nojekyll

      - name: Publish branch site
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./web/dist
          destination_dir: ${{ env.DEPLOY_SUBDIR }}
          keep_files: true

      - name: Print site URL
        shell: bash
        run: echo "Deployed to ${SITE_URL}"
