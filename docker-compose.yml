services:
  bot:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - DATABASE_URL=postgresql://orbatuser:${DB_PASSWORD}@db:5432/orbatbot
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID}
      - DISCORD_CLIENT_SECRET=${DISCORD_CLIENT_SECRET}
      - DISCORD_REDIRECT_URI=http://localhost:8080/api/auth/discord/callback
      - FRONTEND_ORIGINS=http://localhost:5173
      - COOKIE_SECURE=false
      - COOKIE_SAMESITE=lax
      - PORT=8080
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=orbatbot
      - POSTGRES_USER=orbatuser
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orbatuser -d orbatbot"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
